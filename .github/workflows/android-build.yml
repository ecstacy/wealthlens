name: Build Android APK

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build release APK
        working-directory: android
        run: |
          ./gradlew :app:assembleRelease \
            -x lint -x lintVitalRelease -x lintVitalAnalyzeRelease -x test \
            -PreactNativeArchitectures=arm64-v8a

      # NOTE: keystore.properties is not in the repo, so CI builds are
      # debug-signed automatically (via the fallback in app/build.gradle).
      # That's fine for downloading/testing; sign locally for distributable builds.
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: wealthlens-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
